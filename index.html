<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening YouTube | Blood On The Floor We Dance</title>
  <meta name="description" content="Opening Blood On The Floor We Dance in YouTube.">
  <meta name="theme-color" content="#020203">
  <meta property="og:title" content="Blood On The Floor We Dance">
  <meta property="og:description" content="Open the music video in YouTube.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://i.ytimg.com/vi/sb3vU8yWJJ4/hqdefault.jpg">
  <meta property="og:url" content="https://gaswhatwesmoke.github.io/blood-on-the-floor-we-dance-link/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Blood On The Floor We Dance">
  <meta name="twitter:description" content="Open the music video in YouTube.">
  <meta name="twitter:image" content="https://i.ytimg.com/vi/sb3vU8yWJJ4/hqdefault.jpg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020203;
      --text: #f8f8f6;
      --muted: #b1b1ac;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI Variable Text", "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(100%, 420px);
      text-align: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 18px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      animation: spin 900ms linear infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.96rem;
    }

    .actions {
      display: none;
      gap: 10px;
      margin-top: 22px;
    }

    .actions.visible {
      display: grid;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      border-radius: 999px;
      padding: 12px 18px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1px solid var(--line);
    }

    .button.primary {
      background: var(--accent);
      color: #070708;
      border-color: transparent;
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
    }

    .note {
      margin-top: 18px;
      font-size: 0.82rem;
      color: #8b8b87;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <h1 id="headline">Opening YouTube...</h1>
    <p id="status">Trying the fastest route out of the Instagram browser.</p>

    <div class="actions" id="actions">
      <a class="button primary" id="primary-action" href="#">Open in Safari</a>
      <a class="button secondary" id="secondary-action" href="#">Open in YouTube</a>
      <a class="button secondary" id="browser-action" href="#">Watch in Browser</a>
    </div>

    <p class="note" id="note">This page is only here to escape the in-app browser as fast as possible.</p>
  </main>

  <script>
    const config = {
      videoId: "sb3vU8yWJJ4",
      defaultTracking: {
        utm_source: "meta",
        utm_medium: "paid_social",
        utm_campaign: "blood_on_the_floor_we_dance",
        utm_content: "meta_ad"
      }
    };

    const headlineNode = document.getElementById("headline");
    const statusNode = document.getElementById("status");
    const noteNode = document.getElementById("note");
    const actionsNode = document.getElementById("actions");
    const primaryActionNode = document.getElementById("primary-action");
    const secondaryActionNode = document.getElementById("secondary-action");
    const browserActionNode = document.getElementById("browser-action");

    function isIos() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent || "");
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent || "");
    }

    function isInstagramFamilyBrowser() {
      return /Instagram|FBAN|FBAV|FB_IAB|FB4A/i.test(navigator.userAgent || "");
    }

    function buildTrackedWebUrl() {
      const url = new URL("https://www.youtube.com/watch");
      url.searchParams.set("v", config.videoId);

      Object.entries(config.defaultTracking).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      new URLSearchParams(window.location.search).forEach((value, key) => {
        url.searchParams.set(key, value);
      });

      return url.toString();
    }

    function buildYouTubeAppUrl() {
      return "youtube://watch?v=" + config.videoId;
    }

    function buildSafariEscapeUrl() {
      return buildTrackedWebUrl().replace(/^https:\/\//i, "x-safari-https://");
    }

    function buildLegacySafariEscapeUrl() {
      return "com-apple-mobilesafari-tab:" + buildTrackedWebUrl();
    }

    function buildAndroidIntentUrl() {
      return "intent://www.youtube.com/watch?" +
        new URL(buildTrackedWebUrl()).searchParams.toString() +
        "#Intent;scheme=https;package=com.google.android.youtube;S.browser_fallback_url=" +
        encodeURIComponent(buildTrackedWebUrl()) +
        ";end;";
    }

    function showActions(mode) {
      const webUrl = buildTrackedWebUrl();
      const safariUrl = buildSafariEscapeUrl();
      const legacySafariUrl = buildLegacySafariEscapeUrl();
      const youtubeAppUrl = buildYouTubeAppUrl();
      const androidIntentUrl = buildAndroidIntentUrl();

      actionsNode.classList.add("visible");
      browserActionNode.href = webUrl;

      if (mode === "instagram-ios") {
        primaryActionNode.textContent = "Open in Safari";
        primaryActionNode.href = safariUrl;
        secondaryActionNode.textContent = "Open in YouTube";
        secondaryActionNode.href = youtubeAppUrl;
        noteNode.textContent = "If Safari opens, Safari should have the best shot at handing off to the YouTube app.";
      } else if (mode === "android") {
        primaryActionNode.textContent = "Open in YouTube";
        primaryActionNode.href = androidIntentUrl;
        secondaryActionNode.textContent = "Watch in Browser";
        secondaryActionNode.href = webUrl;
        noteNode.textContent = "Android uses an intent link first, then falls back to the YouTube web URL.";
      } else {
        primaryActionNode.textContent = "Open in YouTube";
        primaryActionNode.href = youtubeAppUrl;
        secondaryActionNode.textContent = "Watch in Browser";
        secondaryActionNode.href = webUrl;
        noteNode.textContent = "If the app does not open, use the browser button.";
      }

      primaryActionNode.addEventListener("click", (event) => {
        if (mode === "instagram-ios") {
          event.preventDefault();
          window.location.href = safariUrl;
          window.setTimeout(() => {
            window.location.href = legacySafariUrl;
          }, 500);
        }
      }, { once: true });
    }

    function updateStatus(headline, message) {
      headlineNode.textContent = headline;
      statusNode.textContent = message;
    }

    function attemptInstagramIosEscape() {
      updateStatus("Opening Safari first...", "Trying to leave Instagram's browser before opening YouTube.");

      const safariUrl = buildSafariEscapeUrl();
      const legacySafariUrl = buildLegacySafariEscapeUrl();

      window.setTimeout(() => {
        window.location.href = safariUrl;
      }, 120);

      window.setTimeout(() => {
        window.location.href = legacySafariUrl;
      }, 650);

      window.setTimeout(() => {
        updateStatus("Tap to continue", "Instagram stayed in control. The best free workaround is to force Safari first.");
        showActions("instagram-ios");
      }, 1450);
    }

    function attemptAndroidOpen() {
      updateStatus("Opening YouTube...", "Trying the Android app link first.");

      window.setTimeout(() => {
        window.location.href = buildAndroidIntentUrl();
      }, 120);

      window.setTimeout(() => {
        updateStatus("Still here?", "Use the button below if Android did not leave the in-app browser.");
        showActions("android");
      }, 1450);
    }

    function attemptGenericIosOpen() {
      updateStatus("Opening YouTube...", "Trying the YouTube app directly.");

      window.setTimeout(() => {
        window.location.href = buildYouTubeAppUrl();
      }, 120);

      window.setTimeout(() => {
        updateStatus("Still here?", "Use Safari or the browser fallback if the app did not open.");
        showActions("instagram-ios");
      }, 1450);
    }

    function attemptDesktopOpen() {
      updateStatus("Redirecting...", "Desktop detected. Sending you straight to the YouTube watch page.");

      window.setTimeout(() => {
        window.location.replace(buildTrackedWebUrl());
      }, 120);
    }

    window.addEventListener("load", () => {
      browserActionNode.href = buildTrackedWebUrl();

      if (!isIos() && !isAndroid()) {
        attemptDesktopOpen();
        return;
      }

      if (isIos() && isInstagramFamilyBrowser()) {
        attemptInstagramIosEscape();
        return;
      }

      if (isAndroid()) {
        attemptAndroidOpen();
        return;
      }

      attemptGenericIosOpen();
    });
  </script>
</body>
</html>
