<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening YouTube</title>
  <meta name="description" content="Opening Blood On The Floor We Dance in YouTube.">
  <meta name="theme-color" content="#000000">
  <meta property="og:title" content="Blood On The Floor We Dance">
  <meta property="og:description" content="Open the music video in YouTube.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://i.ytimg.com/vi/sb3vU8yWJJ4/hqdefault.jpg">
  <meta property="og:url" content="https://gaswhatwesmoke.github.io/blood-on-the-floor-we-dance-link/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Blood On The Floor We Dance">
  <meta name="twitter:description" content="Open the music video in YouTube.">
  <meta name="twitter:image" content="https://i.ytimg.com/vi/sb3vU8yWJJ4/hqdefault.jpg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --text: #f4f4f2;
      --muted: #a5a5a0;
      --line: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI Variable Text", "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      overflow: hidden;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .shell.visible {
      visibility: visible;
      opacity: 1;
    }

    main {
      width: min(100%, 340px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid var(--line);
    }

    .button.primary {
      background: #ffffff;
      color: #050506;
      border-color: transparent;
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
    }

    .note {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #858580;
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <main>
      <h1 id="headline">Still inside Instagram?</h1>
      <p id="status">Tap Safari first. It gives YouTube the best chance to open the app.</p>

      <div class="actions">
        <a class="button primary" id="primary-action" href="#">Open in Safari</a>
        <a class="button secondary" id="secondary-action" href="#">Open in YouTube</a>
        <a class="button secondary" id="browser-action" href="#">Watch in Browser</a>
      </div>

      <p class="note" id="note">This page only appears if the automatic handoff fails.</p>
    </main>
  </div>

  <script>
    const config = {
      videoId: "sb3vU8yWJJ4",
      revealDelay: 1100,
      defaultTracking: {
        utm_source: "meta",
        utm_medium: "paid_social",
        utm_campaign: "blood_on_the_floor_we_dance",
        utm_content: "meta_ad"
      }
    };

    const shellNode = document.getElementById("shell");
    const headlineNode = document.getElementById("headline");
    const statusNode = document.getElementById("status");
    const noteNode = document.getElementById("note");
    const primaryActionNode = document.getElementById("primary-action");
    const secondaryActionNode = document.getElementById("secondary-action");
    const browserActionNode = document.getElementById("browser-action");
    let handoffSucceeded = false;

    function isIos() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent || "");
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent || "");
    }

    function isInstagramFamilyBrowser() {
      return /Instagram|FBAN|FBAV|FB_IAB|FB4A/i.test(navigator.userAgent || "");
    }

    function buildTrackedWebUrl() {
      const url = new URL("https://www.youtube.com/watch");
      url.searchParams.set("v", config.videoId);

      Object.entries(config.defaultTracking).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      new URLSearchParams(window.location.search).forEach((value, key) => {
        url.searchParams.set(key, value);
      });

      return url.toString();
    }

    function buildYouTubeAppUrl() {
      return "youtube://watch?v=" + config.videoId;
    }

    function buildSafariEscapeUrl() {
      return buildTrackedWebUrl().replace(/^https:\/\//i, "x-safari-https://");
    }

    function buildLegacySafariEscapeUrl() {
      return "com-apple-mobilesafari-tab:" + buildTrackedWebUrl();
    }

    function buildAndroidIntentUrl() {
      return "intent://www.youtube.com/watch?" +
        new URL(buildTrackedWebUrl()).searchParams.toString() +
        "#Intent;scheme=https;package=com.google.android.youtube;S.browser_fallback_url=" +
        encodeURIComponent(buildTrackedWebUrl()) +
        ";end;";
    }

    function markHandoff() {
      handoffSucceeded = true;
    }

    function revealFallback(headline, message, note, mode) {
      if (handoffSucceeded || document.hidden) {
        return;
      }

      const webUrl = buildTrackedWebUrl();
      const safariUrl = buildSafariEscapeUrl();
      const legacySafariUrl = buildLegacySafariEscapeUrl();
      const youtubeAppUrl = buildYouTubeAppUrl();
      const androidIntentUrl = buildAndroidIntentUrl();

      headlineNode.textContent = headline;
      statusNode.textContent = message;
      noteNode.textContent = note;
      browserActionNode.href = webUrl;

      if (mode === "instagram-ios") {
        primaryActionNode.textContent = "Open in Safari";
        primaryActionNode.href = safariUrl;
        secondaryActionNode.textContent = "Open in YouTube";
        secondaryActionNode.href = youtubeAppUrl;

        primaryActionNode.onclick = (event) => {
          event.preventDefault();
          window.location.href = safariUrl;
          window.setTimeout(() => {
            window.location.href = legacySafariUrl;
          }, 350);
        };
      } else if (mode === "android") {
        primaryActionNode.textContent = "Open in YouTube";
        primaryActionNode.href = androidIntentUrl;
        secondaryActionNode.textContent = "Watch in Browser";
        secondaryActionNode.href = webUrl;
        primaryActionNode.onclick = null;
      } else {
        primaryActionNode.textContent = "Open in YouTube";
        primaryActionNode.href = youtubeAppUrl;
        secondaryActionNode.textContent = "Watch in Browser";
        secondaryActionNode.href = webUrl;
        primaryActionNode.onclick = null;
      }

      shellNode.classList.add("visible");
    }

    function attemptInstagramIosEscape() {
      const safariUrl = buildSafariEscapeUrl();
      const legacySafariUrl = buildLegacySafariEscapeUrl();

      window.setTimeout(() => {
        window.location.replace(safariUrl);
      }, 40);

      window.setTimeout(() => {
        window.location.replace(legacySafariUrl);
      }, 360);

      window.setTimeout(() => {
        revealFallback(
          "Still inside Instagram?",
          "Tap Safari first. It gives YouTube the best chance to open the app.",
          "This page only appears if Instagram blocked the automatic escape.",
          "instagram-ios"
        );
      }, config.revealDelay);
    }

    function attemptAndroidOpen() {
      const androidIntentUrl = buildAndroidIntentUrl();

      window.setTimeout(() => {
        window.location.replace(androidIntentUrl);
      }, 40);

      window.setTimeout(() => {
        revealFallback(
          "Still inside the browser?",
          "Tap the button below to try the YouTube app again.",
          "Android intent links usually work best before the browser fallback.",
          "android"
        );
      }, config.revealDelay);
    }

    function attemptGenericIosOpen() {
      const youtubeAppUrl = buildYouTubeAppUrl();

      window.setTimeout(() => {
        window.location.replace(youtubeAppUrl);
      }, 40);

      window.setTimeout(() => {
        revealFallback(
          "Still here?",
          "Try Safari first, then YouTube if the app did not open.",
          "Safari can improve the chance of the YouTube app opening on iPhone.",
          "instagram-ios"
        );
      }, config.revealDelay);
    }

    function attemptDesktopOpen() {
      window.setTimeout(() => {
        window.location.replace(buildTrackedWebUrl());
      }, 40);
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        markHandoff();
      }
    });

    window.addEventListener("pagehide", markHandoff);
    window.addEventListener("blur", markHandoff);

    window.addEventListener("load", () => {
      browserActionNode.href = buildTrackedWebUrl();

      if (!isIos() && !isAndroid()) {
        attemptDesktopOpen();
        return;
      }

      if (isIos() && isInstagramFamilyBrowser()) {
        attemptInstagramIosEscape();
        return;
      }

      if (isAndroid()) {
        attemptAndroidOpen();
        return;
      }

      attemptGenericIosOpen();
    });
  </script>
</body>
</html>
